<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Post — AKA Digital CMS</title>
  <link rel="stylesheet" href="/admin/admin.css" />
  <style>
    .main-content { max-width: none; }
    .editor-layout { display: flex; gap: 24px; align-items: flex-start; }
    .editor-col { flex: 1 1 480px; min-width: 0; }
    .preview-col { flex: 1 1 480px; min-width: 0; position: sticky; top: 20px; }
    .preview-frame-wrap {
      background: var(--white); border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden; display: flex; flex-direction: column;
      height: calc(100vh - 140px);
    }
    .preview-frame-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-bottom: 1px solid var(--border); background: #fafafa;
    }
    .preview-frame-header .btn-xs { cursor: pointer; border: 1px solid var(--border); background: #fff; }
    #previewStatus { font-size: 12px; color: var(--slate, #64748b); }
    #previewFrame { flex: 1; width: 100%; border: 0; background: #fff; }
    @media (max-width: 1200px) {
      .editor-layout { flex-direction: column; }
      .preview-col { position: static; width: 100%; }
      .preview-frame-wrap { height: 700px; }
    }
  </style>
</head>
<body class="cms-body">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="/images/logos/aka-logo-rec.png" alt="AKA Digital" style="height:34px;width:auto;border-radius:8px;background:#fff;padding:3px 7px;" />
      <div><div class="logo-name">AKA Digital</div><div class="logo-sub">CMS</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Content</div>
      <a href="/admin/dashboard" class="nav-item">← Dashboard</a>
      <a href="/admin/blog-form" class="nav-item active">✎ Blog Post</a>
      <a href="/admin/events-form" class="nav-item">◷ Event</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-badge" id="userBadge">—</div>
      <button class="logout-btn" id="logoutBtn">Sign out</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="page-header">
      <div>
        <h1 class="page-title" id="formTitle">New Blog Post</h1>
        <p class="page-sub">Fill in the fields below and click Save. Go to the Dashboard to publish your changes live.</p>
      </div>
      <span id="statusBadge" class="status-badge status-draft">Draft</span>
    </header>

    <div id="statusBanner" class="status-banner" style="display:none"></div>

    <div class="editor-layout">
    <div class="editor-col">
    <form id="blogForm" class="cms-form">

      <!-- Row 1: Title -->
      <div class="form-group full">
        <label>Post Title <span class="req">*</span></label>
        <input id="title" type="text" placeholder="e.g. How to Build a First-Party Data Strategy in Vietnam" required />
      </div>

      <!-- Row 2: Slug (auto-filled) -->
      <div class="form-group full">
        <label>URL Slug <span class="hint">— auto-generated, editable</span></label>
        <div class="slug-row">
          <span class="slug-prefix">/blog/</span>
          <input id="slug" type="text" placeholder="how-to-build-first-party-data" />
        </div>
      </div>

      <!-- Row 3: Excerpt -->
      <div class="form-group full">
        <label>Excerpt <span class="req">*</span></label>
        <textarea id="excerpt" rows="2" placeholder="One or two sentences summarising the article. Shown in cards and Google search results."></textarea>
      </div>

      <!-- Row 4: Cover image -->
      <div class="form-group">
        <label>Cover Image</label>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="coverFile" accept="image/*" style="display:none" />
          <img id="coverPreview" src="" alt="" style="display:none;max-height:120px;border-radius:8px;" />
          <div id="uploadPrompt">
            <div class="upload-icon">⬆</div>
            <div>Click to upload or paste image URL below</div>
          </div>
        </div>
        <input id="cover_image" type="text" placeholder="or paste image URL: /images/uploads/..." style="margin-top:8px" />
      </div>

      <!-- Row 5: Meta fields -->
      <div class="form-group">
        <label>Author Name</label>
        <input id="author" type="text" placeholder="Jeffrey Teo" value="AKA Digital Team" />
      </div>
      <div class="form-group">
        <label>Author Title</label>
        <input id="author_title" type="text" placeholder="Managing Partner, AKA Digital" value="AKA Digital" />
      </div>
      <div class="form-group">
        <label>Date</label>
        <input id="date" type="date" />
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="category">
          <option>AI &amp; Search</option>
          <option>CRM &amp; Automation</option>
          <option>Data Strategy</option>
          <option>Mobile Marketing</option>
          <option>Product Analytics</option>
          <option>Programmatic</option>
          <option>Social Media</option>
          <option selected>MarTech</option>
          <option>Case Study</option>
          <option>Industry Report</option>
        </select>
      </div>
      <div class="form-group">
        <label>Read Time (minutes)</label>
        <input id="read_time" type="number" value="5" min="1" max="60" />
      </div>
      <div class="form-group">
        <label>Tags <span class="hint">— comma separated</span></label>
        <input id="tags" type="text" placeholder="MarTech, AI, Vietnam, CDP" />
      </div>
      <div class="form-group">
        <label>Featured post?</label>
        <label class="toggle-label">
          <input id="featured" type="checkbox" />
          <span class="toggle-track"></span>
          Show in featured section
        </label>
      </div>

      <!-- Body content -->
      <div class="form-group full">
        <label>Article Content <span class="req">*</span></label>
        <div class="body-tabs">
          <button type="button" class="tab active" data-tab="write">Write</button>
          <button type="button" class="tab" data-tab="preview">Preview</button>
        </div>
        <div id="bodyWriteView">
          <div class="editor-toolbar" id="editorToolbar">
            <button type="button" data-cmd="bold" title="Bold"><b>B</b></button>
            <button type="button" data-cmd="italic" title="Italic"><i>I</i></button>
            <span class="toolbar-sep"></span>
            <button type="button" data-cmd="formatBlock" data-value="h2" title="Heading">H2</button>
            <button type="button" data-cmd="formatBlock" data-value="h3" title="Subheading">H3</button>
            <button type="button" data-cmd="formatBlock" data-value="p" title="Paragraph">¶</button>
            <span class="toolbar-sep"></span>
            <button type="button" data-cmd="insertUnorderedList" title="Bullet list">• List</button>
            <button type="button" data-cmd="insertOrderedList" title="Numbered list">1. List</button>
            <button type="button" data-cmd="formatBlock" data-value="blockquote" title="Quote">" Quote</button>
            <span class="toolbar-sep"></span>
            <button type="button" data-cmd="createLink" title="Insert link">🔗 Link</button>
          </div>
          <div id="body_editor" class="body-editable" contenteditable="true" data-placeholder="Start writing your article here — no code needed, just type and use the toolbar above to format."></div>
          <div id="wordCount" class="word-count">0 words</div>
        </div>
        <div id="bodyPreview" class="body-preview" style="display:none"></div>
      </div>

      <!-- Actions -->
      <div class="form-actions full publish-actions">
        <button type="button" class="btn-draft" id="saveDraftBtn">Save as Draft</button>
        <button type="button" class="btn-publish" id="publishBtn">Publish</button>
        <a href="/admin/dashboard" class="btn-ghost">Cancel</a>
        <span id="formStatus" class="form-status"></span>
      </div>

    </form>
    </div>

    <div class="preview-col">
      <div class="preview-frame-wrap">
        <div class="preview-frame-header">
          <strong style="font-size:13px">Live Preview — as it will publish</strong>
          <span style="display:flex;align-items:center;gap:10px">
            <span id="previewStatus">—</span>
            <button type="button" class="btn-xs" id="refreshPreviewBtn">↻ Refresh</button>
          </span>
        </div>
        <iframe id="previewFrame" title="Blog post preview"></iframe>
      </div>
    </div>
    </div>
  </main>

  <script src="/admin/admin.js"></script>
  <script>
    requireAuth();
    document.getElementById('userBadge').textContent = localStorage.getItem('aka_cms_user');
    document.getElementById('logoutBtn').addEventListener('click', logout);

    // Set default date to today
    document.getElementById('date').value = new Date().toISOString().split('T')[0];

    // Auto-slugify title
    document.getElementById('title').addEventListener('input', function() {
      document.getElementById('slug').value = slugify(this.value);
    });

    // Image upload
    const uploadZone = document.getElementById('uploadZone');
    const coverFile  = document.getElementById('coverFile');
    const coverImg   = document.getElementById('cover_image');
    const preview    = document.getElementById('coverPreview');
    const prompt     = document.getElementById('uploadPrompt');

    uploadZone.addEventListener('click', () => coverFile.click());
    coverFile.addEventListener('change', async () => {
      const file = coverFile.files[0];
      if (!file) return;
      prompt.textContent = 'Uploading…';
      const r = await uploadImage(file);
      if (r.ok) {
        coverImg.value = r.url;
        preview.src = r.url;
        preview.style.display = 'block';
        prompt.style.display  = 'none';
        schedulePreview();
      } else {
        prompt.textContent = '✗ ' + r.error;
      }
    });

    coverImg.addEventListener('input', () => {
      if (coverImg.value) {
        preview.src = coverImg.value;
        preview.style.display = 'block';
        prompt.style.display  = 'none';
      }
    });

    // Rich text toolbar — no HTML knowledge required
    const bodyEditor = document.getElementById('body_editor');
    document.getElementById('editorToolbar').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-cmd]');
      if (!btn) return;
      bodyEditor.focus();
      const cmd = btn.dataset.cmd;
      if (cmd === 'createLink') {
        const url = window.prompt('Link URL (e.g. https://example.com):', 'https://');
        if (url) document.execCommand('createLink', false, url);
      } else {
        document.execCommand(cmd, false, btn.dataset.value || undefined);
      }
    });

    // Word / character count with over-limit warning
    const WORD_WARN_LIMIT = 3000;
    const CHAR_WARN_LIMIT = 20000;
    function updateWordCount() {
      const text  = bodyEditor.innerText.trim();
      const words = text ? text.split(/\s+/).length : 0;
      const chars = text.length;
      const el = document.getElementById('wordCount');
      el.textContent = words + ' words · ' + chars.toLocaleString() + ' characters';
      el.classList.remove('warn', 'over');
      if (words > WORD_WARN_LIMIT || chars > CHAR_WARN_LIMIT) {
        el.textContent += ' — this is quite long, consider shortening or splitting into another post';
        el.classList.add('over');
      }
    }
    bodyEditor.addEventListener('input', updateWordCount);

    // Tab toggle (Write / Preview)
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const isPreview = tab.dataset.tab === 'preview';
        document.getElementById('bodyWriteView').style.display = isPreview ? 'none' : '';
        document.getElementById('bodyPreview').style.display    = isPreview ? '' : 'none';
        if (isPreview) {
          document.getElementById('bodyPreview').innerHTML = bodyEditor.innerHTML;
        }
      });
    });

    // Check if editing existing post
    const params = new URLSearchParams(location.search);
    const editSlug = params.get('edit');

    function setStatusBadge(status) {
      const badge = document.getElementById('statusBadge');
      const isPublished = status === 'published';
      badge.textContent = isPublished ? 'Published' : 'Draft';
      badge.className = 'status-badge ' + (isPublished ? 'status-published' : 'status-draft');
    }

    if (editSlug) {
      document.getElementById('formTitle').textContent = 'Edit Blog Post';
      apiFetch('/api/blogs').then(blogs => {
        const post = blogs.find(b => b.slug === editSlug);
        if (!post) return;
        setStatusBadge(post.status);
        document.getElementById('title').value       = post.title;
        document.getElementById('slug').value        = post.slug;
        document.getElementById('excerpt').value     = post.excerpt;
        document.getElementById('cover_image').value = post.cover_image;
        document.getElementById('author').value      = post.author;
        document.getElementById('author_title').value= post.author_title;
        document.getElementById('date').value        = post.date;
        document.getElementById('category').value    = post.category;
        document.getElementById('read_time').value   = post.read_time;
        document.getElementById('tags').value        = Array.isArray(post.tags) ? post.tags.join(', ') : '';
        document.getElementById('featured').checked  = post.featured;
        bodyEditor.innerHTML = post.body_html || '';
        updateWordCount();
        if (post.cover_image) {
          preview.src = post.cover_image;
          preview.style.display = 'block';
          prompt.style.display  = 'none';
        }
        refreshPreview();
      });
    }

    function getFormPayload() {
      return {
        slug:         document.getElementById('slug').value || slugify(document.getElementById('title').value),
        title:        document.getElementById('title').value,
        excerpt:      document.getElementById('excerpt').value,
        cover_image:  document.getElementById('cover_image').value,
        author:       document.getElementById('author').value,
        author_title: document.getElementById('author_title').value,
        date:         document.getElementById('date').value,
        category:     document.getElementById('category').value,
        read_time:    parseInt(document.getElementById('read_time').value) || 5,
        tags:         document.getElementById('tags').value.split(',').map(t => t.trim()).filter(Boolean),
        featured:     document.getElementById('featured').checked,
        body_html:    bodyEditor.innerHTML,
      };
    }

    // Save as Draft / Publish — same payload, different target status.
    async function saveBlogPost(targetStatus, btn) {
      if (!document.getElementById('title').value.trim()) {
        alert('Title is required.');
        return;
      }
      const status = document.getElementById('formStatus');
      const draftBtn = document.getElementById('saveDraftBtn');
      const pubBtn   = document.getElementById('publishBtn');
      draftBtn.disabled = true; pubBtn.disabled = true;
      const original = btn.textContent;
      btn.textContent = targetStatus === 'published' ? 'Publishing…' : 'Saving…';

      const payload = { ...getFormPayload(), status: targetStatus };

      try {
        const method  = editSlug ? 'PUT' : 'POST';
        const url     = editSlug ? `/api/blogs/${editSlug}` : '/api/blogs/new';
        const result  = await apiFetch(url, method, payload);

        if (result.ok) {
          setStatusBadge(targetStatus);
          status.textContent = '';
          status.className   = 'form-status success';
          if (targetStatus === 'published') {
            status.append('✓ Published. ');
            const a = document.createElement('a');
            a.href = '/admin/dashboard';
            a.textContent = 'Go to Dashboard to Build Site to make this live →';
            status.appendChild(a);
          } else {
            status.textContent = '✓ Saved as draft — not visible on the live site yet.';
          }
        } else {
          status.textContent = '⚠ ' + (result.error || 'Error saving');
          status.className   = 'form-status error';
        }
      } catch (err) {
        status.textContent = '⚠ Network error';
        status.className   = 'form-status error';
      }

      draftBtn.disabled = false; pubBtn.disabled = false;
      btn.textContent = original;
    }

    document.getElementById('saveDraftBtn').addEventListener('click', e => saveBlogPost('draft', e.target));
    document.getElementById('publishBtn').addEventListener('click', e => saveBlogPost('published', e.target));

    // ── Live preview — renders the draft through the real template, so it
    // looks exactly like the published page will, without saving anything.
    const previewFrame  = document.getElementById('previewFrame');
    const previewStatus = document.getElementById('previewStatus');
    let previewTimer = null;
    let previewSeq = 0;

    async function refreshPreview() {
      const seq = ++previewSeq;
      previewStatus.textContent = 'Rendering…';
      try {
        const r = await apiFetch('/api/preview/blog', 'POST', getFormPayload());
        if (seq !== previewSeq) return;
        if (r.ok && r.html) {
          previewFrame.srcdoc = r.html;
          previewStatus.textContent = 'Updated ' + new Date().toLocaleTimeString();
        } else {
          previewStatus.textContent = '✗ ' + (r.error || 'Preview failed');
        }
      } catch (err) {
        if (seq === previewSeq) previewStatus.textContent = '✗ ' + err.message;
      }
    }

    function schedulePreview() {
      clearTimeout(previewTimer);
      previewTimer = setTimeout(refreshPreview, 600);
    }

    document.getElementById('blogForm').addEventListener('input', schedulePreview);
    document.getElementById('blogForm').addEventListener('change', schedulePreview);
    document.getElementById('refreshPreviewBtn').addEventListener('click', refreshPreview);

    if (!editSlug) refreshPreview();
  </script>
</body>
</html>
